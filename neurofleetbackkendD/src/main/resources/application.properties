spring.application.name=neurofleetbackkendD

# Server Configuration
server.port=8083
ai.service.url=http://localhost:5000

# MySQL Database Configuration (Using Environment Variables)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fleetneuro?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:system}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (Using Environment Variables)
jwt.secret=${JWT_SECRET:NeuroFleetXSecretKey2024SuperSecureKeyForJWTAuthentication}
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.example.neurofleetbackkendD=DEBUG
